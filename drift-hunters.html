<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; URL='games/drift-hunters/index.html'" />
  <title>Redirecting...</title>
  <title>Games</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Orbitron', sans-serif;
      background: linear-gradient(180deg, #0f0f0f, #1a1a2e);
      overflow-x: hidden;
      color: #ffffff;
      height: 540px;
    }
    .particle {
      position: absolute;
      bottom: 0;
      width: 4px;
      height: 4px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      animation: floatUp 5s infinite;
    }
    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(1);
        opacity: 0.5;
      }
      100% {
        transform: translateY(-100vh) scale(0.5);
        opacity: 0;
      }
    }
    #gamePage { display: none; }
    .loading p {
      position: absolute;
      top: 240px;
      left: 300px;
      font-size: 60px;
    }
  </style>
</head>
<body>
  <div class="loading">
    <p>Loading...</p>
  </div>
</body>
