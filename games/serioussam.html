<script>
const url1 = "https://cdn.jsdelivr.net/gh/UncopylockDomainHere/testing/index.html";
const url2 = "https://cdn.jsdelivr.net/gh/prokid8467-collab/serious/local/index.html";

// Load first page
fetch(url1)
  .then(res => res.text())
  .then(html => {
    document.open();
    document.write(html);
    document.close();

    // Wait 5 seconds, then load second page
    setTimeout(() => {
      fetch(url2)
        .then(res => res.text())
        .then(html => {
          document.open();
          document.write(html);
          document.close();
        });
    }, 5000); // 5000 ms = 5 seconds
  });
</script>
