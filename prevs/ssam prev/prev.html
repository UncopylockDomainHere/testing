  const GAME_URL = ""; // 🔴 CHANGE THIS

  async function loadRemoteHTML(url) {
    try {
      const res = await fetch(url);
      const html = await res.text();

      const container = document.createElement("div");
      container.innerHTML = html;

      // Inject into app
      while (container.firstChild) {
        app.appendChild(container.firstChild);
      }

      // Re-run scripts
      const scripts = app.querySelectorAll("script");
      for (let oldScript of scripts) {
        const newScript = document.createElement("script");

        if (oldScript.src) {
          newScript.src = new URL(oldScript.src, url).href;
        } else {
          newScript.textContent = oldScript.textContent;
        }

        oldScript.replaceWith(newScript);
      }

      console.log("CDN content loaded");
    } catch (err) {
      console.error("Failed to load HTML:", err);
    }
  }

  /* =========================
     🎬 INTRO TIMELINE
     ========================= */
  setTimeout(() => {
    // Fade IN
    content.classList.add("show");

    setTimeout(() => {
      // Fade OUT text
      content.classList.remove("show");

      setTimeout(() => {
        // Fade OUT overlay
        overlay.classList.add("hidden");

        // ✅ LOAD CDN ONLY AFTER INTRO FINISHES
        loadRemoteHTML(GAME_URL);

      }, 3000); // black screen hold

    }, 1000); // visible time

  }, 2000); // initial delay

})();
</script>
</html>
